name: Nightly skill sync

on:
  schedule:
    - cron: '0 2 * * *'   # 2am UTC every night
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  sync:
    name: Sync new skills from watched repos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run skill sync
        run: npm run seed:ci
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # GITHUB_TOKEN is provided automatically by Actions.
          # It covers public repo reads at 1000 req/hr.
          # If rate limits become an issue, create a PAT and store it
          # as a secret named GH_PAT, then replace the line below with:
          # GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
